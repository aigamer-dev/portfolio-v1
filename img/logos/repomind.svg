<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" style="stop-color:#e2e8f0;stop-opacity:1" />
        <stop offset="100%" style="stop-color:#94a3b8;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bgGrad)" />

  <!-- Grid overlay (subtle tech feel) -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="white" stroke-opacity="0.03" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="400" fill="url(#grid)" />

  <!-- Logo Group (Scaled and Positioned Left) -->
  <g transform="translate(180, 200) scale(0.6)">
     <!-- Copy of the "Premium" Logo Geometry -->
     <g transform="translate(0, 0)"> 
        <!-- BACK LAYER -->
        <path d="M-100 -120 L0 -180 L100 -120 V0 L0 60 L-100 0 Z" 
              fill="none" stroke="#475569" stroke-width="40" stroke-linecap="round" stroke-linejoin="round" opacity="0.4"/>

         <!-- Tech Circuit Overlay -->
        <path d="M0 -180 V0" stroke="#63b3ed" stroke-width="4" opacity="0.5"/>
        <circle cx="0" cy="-90" r="6" fill="#63b3ed" opacity="0.5"/>

        <!-- FRONT SHAPES -->
        <!-- Shape A -->
        <path d="M-60 60 L-140 20 L-140 -100 L-60 -140 L20 -100" 
              fill="none" stroke="#e2e8f0" stroke-width="36" stroke-linecap="round" stroke-linejoin="round" />
        <!-- Shape B -->
        <path d="M60 -140 L140 -100 L140 20 L60 60 L-20 20" 
              fill="none" stroke="#e2e8f0" stroke-width="36" stroke-linecap="round" stroke-linejoin="round" />
        
        <!-- Active Circuitry -->
        <path d="M-140 -40 L-60 0 L0 -40 L60 0 L140 -40" 
              fill="none" stroke="#63b3ed" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
        <circle cx="-60" cy="0" r="10" fill="#63b3ed" />
        <circle cx="60" cy="0" r="10" fill="#63b3ed" />
        
        <!-- Central Node -->
        <g transform="translate(0, -40)">
            <circle cx="0" cy="0" r="24" fill="#63b3ed" stroke="none" />
            <circle cx="0" cy="0" r="34" fill="none" stroke="#63b3ed" stroke-width="2" opacity="0.5"/>
        </g>
     </g>
  </g>

  <!-- Text Group -->
  <g transform="translate(380, 230)">
    <text x="0" y="0" font-family="'Inter', sans-serif" font-weight="700" font-size="120" fill="url(#textGrad)" letter-spacing="-4">RepoMind</text>
  </g>

</svg>
